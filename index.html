<!DOCTYPE html>
<html>
<head>
    <title>UMoney Calculator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: 0.3s;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 350px;
            text-align: center;
        }

        h2 {
            margin-bottom: 10px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: #4facfe;
            color: white;
            cursor: pointer;
            width: 95%;
            font-size: 16px;
        }

        button:hover {
            background: #007bff;
        }

        .result {
            margin-top: 15px;
            font-size: 16px;
        }

        .toggle {
            margin-top: 10px;
        }

        /* Dark Mode */
        .dark {
            background: #121212;
        }

        .dark .container {
            background: #1e1e1e;
            color: white;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>💰 UMoney Calculator</h2>

    <input type="number" id="deposit" placeholder="Enter amount (₹)">
        
    <div class="toggle">
        <label>
            <input type="checkbox" id="vip"> VIP (5%)
        </label>
    </div>

    <button onclick="calculate()">Calculate</button>

    <button onclick="toggleDark()">🌙 Toggle Dark Mode</button>

    <div class="result" id="output"></div>
</div>

<script>
    function umoney(deposit, bonus) {
        return deposit * bonus + 2;
    }

    function calculate() {
        let deposit = parseFloat(document.getElementById("deposit").value);
        let custom = parseFloat(document.getElementById("customBonus").value);
        let isVIP = document.getElementById("vip").checked;

        if (isNaN(deposit)) {
            document.getElementById("output").innerHTML = "❌ Enter valid amount!";
            return;
        }

        let bonusRate;

        if (!isNaN(custom)) {
            bonusRate = custom / 100;
        } else if (isVIP) {
            bonusRate = 0.05;
        } else {
            bonusRate = 0.03;
        }

        let bonus = umoney(deposit, bonusRate);

        document.getElementById("output").innerHTML = `
            ✅ Bonus: ₹${bonus.toFixed(2)} <br>
            💵 Total: ₹${(deposit + bonus).toFixed(2)}
        `;
    }

    function toggleDark() {
        document.body.classList.toggle("dark");
    }
</script>

</body>
</html>
